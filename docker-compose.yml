services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DEBUG: "false"
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      # KRX_ID: ${KRX_ID:-}
      # KRX_PW: ${KRX_PW:-}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
