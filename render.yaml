# Render.com — backend (FastAPI) deployment
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kospi-bayesian-screener
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    healthCheckInitialDelaySeconds: 120
    envVars:
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: CACHE_ENABLED
        value: "true"
      - key: CACHE_TTL_SECONDS
        value: "86400"
      - key: SNAPSHOT_ENABLED
        value: "true"
      - key: SQLITE_PATH
        value: "/code/data/screener.db"
    # Render persistent disk (paid): mount at /code/data to retain SQLite snapshots
